<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xyz Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<header class="sticky top-0 z-50 bg-[#073a7a] text-white shadow-md">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">

    <h1 class="text-2xl font-bold">Xyz</h1>

    <nav class="class=hidden md:flex gap-8 text-lg font-semibold">
      <a href="#home" class="hover:text-gray-300">Home</a>
      <a href="#about" class="hover:text-gray-300">About</a>
      <a href="#contact" class="hover:text-gray-300">Contact</a>
    </nav>

    <button id="cartBtn"
  class="bg-white text-[#073a7a] px-4 py-2 rounded-full font-medium hover:bg-gray-200 flex items-center gap-2">
  🛒 Cart (<span id="cartCount">0</span>)
   </button>

  </div>
</header>

<!-- Home -->
<section class="text-center py-12 px-4" id="home">

  <h2 class="text-4xl font-bold text-[#073a7a] mb-3">
    Discover Your Style
  </h2>

  <p class="text-gray-600 mb-6">
    Premium products curated for you
  </p>

  <div class="max-w-xl mx-auto">
    <input 
      id="searchInput"
      type="search"
      placeholder="Search for products..."
      class="w-full px-5 py-3 rounded-full border border-gray-300 shadow-sm 
             focus:ring-2 focus:ring-[#073a7a] outline-none"
    >
  </div>

</section>


<!-- filter Bar-->
<div class="max-w-5xl mx-auto bg-white p-4 rounded-2xl ">

  <div class="flex flex-wrap gap-3 justify-center">

    <!-- Category -->
    <button class="filter-btn px-4 py-2 rounded-full border border-[#073a7a] text-[#073a7a] hover:bg-[#073a7a] hover:text-white transition" data-category="all">All</button>

    <button class="filter-btn px-4 py-2 rounded-full border border-[#073a7a] text-[#073a7a] hover:bg-[#073a7a] hover:text-white transition" data-category="electronics">Electronics</button>

    <button class="filter-btn px-4 py-2 rounded-full border border-[#073a7a] text-[#073a7a] hover:bg-[#073a7a] hover:text-white transition" data-category="men's clothing">Fashion</button>

    <button class="filter-btn px-4 py-2 rounded-full border border-[#073a7a] text-[#073a7a] hover:bg-[#073a7a] hover:text-white transition" data-category="jewelery">Accessories</button>

    <button class="filter-btn px-4 py-2 rounded-full border border-[#073a7a] text-[#073a7a] hover:bg-[#073a7a] hover:text-white transition" data-category="women's clothing">Women</button>

    <!-- Price -->
    <select 
  id="priceFilter" 
  class="appearance-none px-4 py-2 rounded-full border border-gray-300 
         text-gray-700 bg-white shadow-sm 
         focus:ring-2 focus:ring-[#073a7a] focus:border-[#073a7a]
         cursor-pointer transition">
      <option value="all">All Prices</option>
      <option value="low">Below ₹1000</option>
      <option value="mid">₹1000 - ₹3000</option>
      <option value="high">Above ₹3000</option>
    </select>

  </div>

</div>

<!--  Product -->
<div id="productContainer" 
  class="max-w-6xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
</div>

<!--  About Us-->
<section id="about" class="max-w-4xl mx-auto px-4 py-12 text-center">
  <h2 class="text-2xl font-bold text-[#073a7a] mb-3">About Us</h2>
  <p class="text-gray-600">
    Xyz Store is your one-stop destination for premium products.
  </p>
</section>

<!-- contact us -->
<section id="contact" class="bg-[#073a7a] text-white py-12 text-center">
  <h2 class="text-2xl font-bold mb-3">Contact Us</h2>
  <p>Email: service@xyz.com</p>
  <p>Phone: +91 6542156311</p>
</section>

<!-- footer -->
<footer class="text-center py-6 bg-[#052c5c] text-gray-300">
  © 2026 Xyz | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>  <!--Sweet Alert  -->
<script src="script.js"></script>
</body>
</html>
